<script>
// Load DOM content/page
document.addEventListener('DOMContentLoaded', function(){
  let lastScrollTop = 0;
  let navbar = document.getElementById('navbar');
  let navMenuContainer = document.querySelector('.navmenu-container-laptop'); // Select the nav menu container

  function shouldNavbarBeVisible() {
    // Check if the nav menu container is displayed as block
    return getComputedStyle(navMenuContainer).display === 'block';
  }

  function hideDropdowns() {
    const dropdownToggles = document.querySelectorAll('.navbar_dropdown-toggle');
    const dropdownMenus = document.querySelectorAll('.navbar_dropmenu');

    dropdownToggles.forEach(function(toggle) {
      const icon = toggle.querySelector('.navbar_dropdown-toggle-icon');
      if (icon) {
        icon.style.transform = 'rotateZ(0deg)';
        setTimeout(function() {
          icon.style.transform = '';
        }, 250);
      }
      if (toggle.classList.contains('w--open')) {
        setTimeout(function() {
          toggle.classList.remove('w--open');
        }, 250);
      }
    });

    dropdownMenus.forEach(function(menu) {
      if (menu.classList.contains('w--open')) {
        menu.style.opacity = '0';
        setTimeout(function() {
          menu.classList.remove('w--open');
          menu.style.opacity = '';
        }, 250);
      }
    });
  }

  window.addEventListener("scroll", function(){
    let currentScroll = window.pageYOffset || document.body.scrollTop;
    
    // Add/remove background blur on scroll
  	if (currentScroll >= 100){
    	navbar.classList.add('has-blur');
  	} else {
    	navbar.classList.remove('has-blur');
  	}

    if (!shouldNavbarBeVisible()) {
      if (currentScroll > lastScrollTop){
        // Only hide dropdowns on scroll down
        hideDropdowns();
        navbar.classList.add('is-hidden');
      } else {
        navbar.classList.remove('is-hidden');
      }
    }

    if (currentScroll <= 1) {
      navbar.classList.remove('is-hidden');
    }

    lastScrollTop = currentScroll;
  });
})
</script>


<script>
// Function to get cookie value
function getCookie(name) {
    let matches = document.cookie.match(new RegExp(
        "(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"
    ));
    return matches ? decodeURIComponent(matches[1]) : undefined;
}

// Modified setCookie function to optionally create session cookies
function setCookie(name, value, days) {
    let expires = "";
    if (days) {
        let date = new Date();
        date.setTime(date.getTime() + (days*24*60*60*1000));
        expires = "; expires=" + date.toUTCString();
    }
    // If 'days' is not provided, the cookie becomes a session cookie
    document.cookie = name + "=" + (value || "") + expires + "; path=/";
}

// Function to handle UTM parameters
function handleUTMParameters() {
    const utms = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'];
    const urlParams = new URLSearchParams(window.location.search);

    utms.forEach(utm => {
        let value = urlParams.get(utm) || getCookie(utm) || '';
        // Omit the 'days' parameter for session cookies
        setCookie(utm, value); // Now stores as a session cookie
    });

    // Handling first site page and previous site page as session cookies
    const currentPath = window.location.pathname;
    let firstSitePage = getCookie('utm_first_site_page') || currentPath;

    // Update only if it's the user's first visit in the session
    if(!sessionStorage.getItem('visited')) {
        setCookie('utm_first_site_page', firstSitePage); // Now stores as a session cookie
        sessionStorage.setItem('visited', 'true');
    }

    // Special handling for previous site page as session cookie
    handlePreviousSitePage();
}

function handlePreviousSitePage() {
    const currentPath = window.location.pathname;
    const previousPath = sessionStorage.getItem('previousPath') || '';

    if(currentPath.includes('/contact-us') && previousPath) {
        setCookie('utm_previous_site_page', previousPath); // Now stores as a session cookie
    }

    if (!currentPath.includes('/contact-us')) {
        sessionStorage.setItem('previousPath', currentPath);
    }
}

// Function to handle trigger element clicks
function setupTriggerElementTracking() {
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('trigger-element')) {
            setCookie('utm_trigger_element', e.target.getAttribute('data-trigger')); // Now stores as a session cookie
        }
    });
}

// Run on document load
document.addEventListener('DOMContentLoaded', function() {
    handleUTMParameters();
    handlePreviousSitePage();
    setupTriggerElementTracking();
});
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // prevent duplicate FAQ schema injection
    if (document.querySelector('script[data-faq-schema="true"]')) {
        return;
    }

    const pageFaqs = document.querySelectorAll(
        '.faq_list-item:not(.w-condition-invisible)'
    );

    if (!pageFaqs.length) return;

    let faqArray = [];

    pageFaqs.forEach((item) => {
        const itemQuestion = item.querySelector('.faq_item-question');
        const itemContent = item.querySelector('.faq_item-content');

        if (!itemQuestion || !itemContent) return;
        if (itemQuestion.classList.contains('w-dyn-bind-empty')) return;

        // get plain text only
        const cleanText = itemContent.textContent.trim();

        if (!cleanText) return;

        faqArray.push({
            "@type": "Question",
            "name": itemQuestion.innerText.trim(),
            "acceptedAnswer": {
                "@type": "Answer",
                "text": cleanText
            }
        });
    });

    if (!faqArray.length) return;

    const faqSchema = {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": faqArray
    };

    const script = document.createElement('script');
    script.type = "application/ld+json";
    script.setAttribute('data-faq-schema', 'true');
    script.textContent = JSON.stringify(faqSchema);

    document.head.appendChild(script);
});
</script>

<script>
  // Додає data-lenis-prevent до всіх скролюваних елементів
  document.addEventListener('DOMContentLoaded', () => {
	  document.querySelectorAll('*').forEach((el) => {
    	const style = getComputedStyle(el);
	    const isScrollableY =
    	  (style.overflowY === 'auto' || style.overflowY === 'scroll') &&
	      el.scrollHeight > el.clientHeight;

    	if (isScrollableY) {
	      el.setAttribute('data-lenis-prevent', '');
    	}
	  });

  
    function easeOutQuad(t) {
      return t * (2 - t);
    }

    function initLenis() {
      if (typeof Lenis !== 'undefined') {
        const lenis = new Lenis({
          smooth: true,
          lerp: 0.1,
          wheelMultiplier: 1,
          easing: easeOutQuad,
          infinite: false,
        });
        
        window.lenis = lenis;

        function raf(time) {
          lenis.raf(time);
          requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
      } else {
        // Якщо Lenis ще не підключений, пробуємо ще раз через 100мс
        setTimeout(initLenis, 100);
      }
    }

    initLenis();
    
//restrict lenis for edit mode
	const isEditor = !!window.WebflowEditor;

    if (!isEditor) return;

    const observer = new MutationObserver((mutations, observerInstance) => {
      const editorMain = document.querySelector('.w-editor-bem-EditorApp_Main');

      if (editorMain) {
        editorMain.setAttribute('data-lenis-prevent', '');
        observerInstance.disconnect(); // Stop watching once it's found
      }
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true,
    });
  });
</script>

	document.addEventListener('DOMContentLoaded', () => {
  	const reviewButtons = document.querySelectorAll('.works-reviews_tab-arrow');
    
    reviewButtons.forEach(item => {
    	item.addEventListener('click', handleNavBtnClick);
    });
    
    function handleNavBtnClick(e) {
    	const target = e.target;
      const currentPane = target.closest('.works-reviews_tab-pane');
      const currentTabInfo = currentPane.dataset.wTab;
      let paneNum = Number(currentTabInfo[currentTabInfo.length - 1]);
      const direction = target.dataset.direction;
      
      if (direction === 'prev') {
      	paneNum -= 1;
      } else if (direction === 'next') {
      	paneNum += 1;
      }
      
      const link = document.querySelector(`a[data-w-tab="Tab ${paneNum}"].works-reviews_tab-link`);
      
      if (link) link.click();
    }
  });
</script>

      function wrapWordsInNode(node) {
        const text = node.nodeValue;
        const words = text.split(/(\s+)/);
        const fragment = document.createDocumentFragment();

        words.forEach((word) => {
          if (word.trim() === "") {
            fragment.appendChild(document.createTextNode(word));
          } else {
            const span = document.createElement("span");
            span.className = "word";
            span.textContent = word;
            span.style.display = "inline-block";
            fragment.appendChild(span);
          }
        });

        return fragment;
      }

      function processElement(el) {
        const childNodes = Array.from(el.childNodes);

        childNodes.forEach((child) => {
          if (child.nodeType === Node.TEXT_NODE) {
            const wrapped = wrapWordsInNode(child);
            el.replaceChild(wrapped, child);
          } else if (child.nodeType === Node.ELEMENT_NODE) {
            processElement(child);
          }

<script>
  // call this to animate the currently active pagination bullet's progress
  function animateActiveBulletProgress() {
    // selector you provided
    const activeProgress = document.querySelector('.works-hero_tabs .swiper-pagination-bullet.swiper-pagination-bullet-active .bullet-progress');

    // reset all progress bars first
    document.querySelectorAll('.works-hero_tabs .bullet-progress').forEach(el => {
      // remove transition so reset is instant
      el.style.transition = 'none';
      el.style.width = '0%';
    });

    if (!activeProgress) return;

    // ensure it starts at 0
    activeProgress.style.width = '0%';

    // force reflow so the transition will be applied from 0
    void activeProgress.offsetWidth;

    // set transition and animate to 100% over 5000ms (5s)
    activeProgress.style.transition = 'width 5000ms linear';
    activeProgress.style.width = '100%';
  }

  // Example: integrate with your existing swiper instance
  // (Assumes you already created `swiper` variable)
  if (typeof swiper !== 'undefined') {
    // run on init (if already initialized, call once)
    // if swiper has init event handler you can place this there instead
    animateActiveBulletProgress();

    // run on slide change
    swiper.on('slideChange', () => {
      animateActiveBulletProgress();
    });

    // optional: if user clicks pagination, wait a tick then animate
    const paginationContainer = document.querySelector('.works-hero_tabs .swiper-pagination');
    if (paginationContainer) {
      paginationContainer.addEventListener('click', () => {
        // small delay for Swiper to update active class
        setTimeout(animateActiveBulletProgress, 10);
      });
    }

    // optional: if autoplay stops/starts you might want to freeze/reset behavior

    // swiper.on('autoplayStart', () => { animateActiveBulletProgress(); });
  } else {
    // If swiper isn't defined yet, wait until DOM ready (or handle your init flow)
    document.addEventListener('DOMContentLoaded', animateActiveBulletProgress);
  }
</script>

(function () {

  function createCharSpans(element) {
    if (!element || element.dataset.eliteSplit === 'true') return [];
    const text = element.textContent || '';
    if (!text.trim()) return [];
    element.dataset.eliteSplit = 'true';
    element.setAttribute('aria-label', text.trim());
    element.textContent = '';
    const spans = [];
    for (const char of text) {
      const span = document.createElement('span');
      span.className = 'elitechwiz-split-char';
      span.textContent = char === ' ' ? '\u00A0' : char;
      span.style.display = 'inline-block';
      element.appendChild(span);
      spans.push(span);
    }
    return spans;
  }
