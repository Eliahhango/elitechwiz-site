<script>
// Load DOM content/page
document.addEventListener('DOMContentLoaded', function(){
  let lastScrollTop = 0;
  let navbar = document.getElementById('navbar');
  let navMenuContainer = document.querySelector('.navmenu-container-laptop'); // Select the nav menu container

  function shouldNavbarBeVisible() {
    // Check if the nav menu container is displayed as block
    return getComputedStyle(navMenuContainer).display === 'block';
  }

  function hideDropdowns() {
    const dropdownToggles = document.querySelectorAll('.navbar_dropdown-toggle');
    const dropdownMenus = document.querySelectorAll('.navbar_dropmenu');

    dropdownToggles.forEach(function(toggle) {
      const icon = toggle.querySelector('.navbar_dropdown-toggle-icon');
      if (icon) {
        icon.style.transform = 'rotateZ(0deg)';
        setTimeout(function() {
          icon.style.transform = '';
        }, 250);
      }
      if (toggle.classList.contains('w--open')) {
        setTimeout(function() {
          toggle.classList.remove('w--open');
        }, 250);
      }
    });

    dropdownMenus.forEach(function(menu) {
      if (menu.classList.contains('w--open')) {
        menu.style.opacity = '0';
        setTimeout(function() {
          menu.classList.remove('w--open');
          menu.style.opacity = '';
        }, 250);
      }
    });
  }

  window.addEventListener("scroll", function(){
    let currentScroll = window.pageYOffset || document.body.scrollTop;
    
    // Add/remove background blur on scroll
  	if (currentScroll >= 100){
    	navbar.classList.add('has-blur');
  	} else {
    	navbar.classList.remove('has-blur');
  	}

    if (!shouldNavbarBeVisible()) {
      if (currentScroll > lastScrollTop){
        // Only hide dropdowns on scroll down
        hideDropdowns();
        navbar.classList.add('is-hidden');
      } else {
        navbar.classList.remove('is-hidden');
      }
    }

    if (currentScroll <= 1) {
      navbar.classList.remove('is-hidden');
    }

    lastScrollTop = currentScroll;
  });
})
</script>


<script>
// Function to get cookie value
function getCookie(name) {
    let matches = document.cookie.match(new RegExp(
        "(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"
    ));
    return matches ? decodeURIComponent(matches[1]) : undefined;
}

// Modified setCookie function to optionally create session cookies
function setCookie(name, value, days) {
    let expires = "";
    if (days) {
        let date = new Date();
        date.setTime(date.getTime() + (days*24*60*60*1000));
        expires = "; expires=" + date.toUTCString();
    }
    // If 'days' is not provided, the cookie becomes a session cookie
    document.cookie = name + "=" + (value || "") + expires + "; path=/";
}

// Function to handle UTM parameters
function handleUTMParameters() {
    const utms = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'];
    const urlParams = new URLSearchParams(window.location.search);

    utms.forEach(utm => {
        let value = urlParams.get(utm) || getCookie(utm) || '';
        // Omit the 'days' parameter for session cookies
        setCookie(utm, value); // Now stores as a session cookie
    });

    // Handling first site page and previous site page as session cookies
    const currentPath = window.location.pathname;
    let firstSitePage = getCookie('utm_first_site_page') || currentPath;

    // Update only if it's the user's first visit in the session
    if(!sessionStorage.getItem('visited')) {
        setCookie('utm_first_site_page', firstSitePage); // Now stores as a session cookie
        sessionStorage.setItem('visited', 'true');
    }

    // Special handling for previous site page as session cookie
    handlePreviousSitePage();
}

function handlePreviousSitePage() {
    const currentPath = window.location.pathname;
    const previousPath = sessionStorage.getItem('previousPath') || '';

    if(currentPath.includes('/contact-us') && previousPath) {
        setCookie('utm_previous_site_page', previousPath); // Now stores as a session cookie
    }

    if (!currentPath.includes('/contact-us')) {
        sessionStorage.setItem('previousPath', currentPath);
    }
}

// Function to handle trigger element clicks
function setupTriggerElementTracking() {
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('trigger-element')) {
            setCookie('utm_trigger_element', e.target.getAttribute('data-trigger')); // Now stores as a session cookie
        }
    });
}

// Run on document load
document.addEventListener('DOMContentLoaded', function() {
    handleUTMParameters();
    handlePreviousSitePage();
    setupTriggerElementTracking();
});
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // prevent duplicate FAQ schema injection
    if (document.querySelector('script[data-faq-schema="true"]')) {
        return;
    }

    const pageFaqs = document.querySelectorAll(
        '.faq_list-item:not(.w-condition-invisible)'
    );

    if (!pageFaqs.length) return;

    let faqArray = [];

    pageFaqs.forEach((item) => {
        const itemQuestion = item.querySelector('.faq_item-question');
        const itemContent = item.querySelector('.faq_item-content');

        if (!itemQuestion || !itemContent) return;
        if (itemQuestion.classList.contains('w-dyn-bind-empty')) return;

        // get plain text only
        const cleanText = itemContent.textContent.trim();

        if (!cleanText) return;

        faqArray.push({
            "@type": "Question",
            "name": itemQuestion.innerText.trim(),
            "acceptedAnswer": {
                "@type": "Answer",
                "text": cleanText
            }
        });
    });

    if (!faqArray.length) return;

    const faqSchema = {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": faqArray
    };

    const script = document.createElement('script');
    script.type = "application/ld+json";
    script.setAttribute('data-faq-schema', 'true');
    script.textContent = JSON.stringify(faqSchema);

    document.head.appendChild(script);
});
</script>

<script>

  const popupOverlay = select('.contact_popup-overlay');
	const popup = select('.contact_popup');

  // popup state
  let isPopupActive = true;

  let exitIntentTriggered = false;

  // close popup
  closePopupButton?.addEventListener('click', handlePopupClose);
  popupOverlay?.addEventListener('click', handlePopupClose);

	function handlePopupOpen() {
  	if (!isPopupActive || exitIntentTriggered) return;
    
	  exitIntentTriggered = true;

	  popupWrapper.style.display = 'flex';

	  gsap.fromTo(
  	  popupWrapper,

    	{ opacity: 0, y: 60 },
	    { opacity: 1, y: 0, duration: 0.45, ease: "power3.out", delay: 0.1 }
  	);
	}

	function handlePopupClose() {

	      popupWrapper.style.display = 'none';

	  tl.to(popup, {

  	.to(popupWrapper, {

	  }, "-=0.15");
	}

  // exit intent
  if (isDesktop()) {
    document.addEventListener("mouseout", (e) => {
      if (!hasInputBlurred) return;

      if (!e.relatedTarget && e.clientY <= 0) {
        handlePopupOpen();
      }
    });

  } else {
let mobileExitIntercepted = false;
let historyInjected = false;

// when user focuses any input → add fake history step
inputs.forEach(input => {
  input.addEventListener("focus", () => {
    if (historyInjected) return;

    history.pushState({ popup: true }, "");
    historyInjected = true;
  });
});

window.addEventListener("popstate", () => {
  if (!hasInputBlurred) return;

  // FIRST BACK → show popup
  if (!mobileExitIntercepted && isPopupActive) {
    mobileExitIntercepted = true;

    handlePopupOpen();

    // keep user on page
    history.pushState({ popup: true }, "");
    return;
  }

  // SECOND BACK → skip fake states
  if (mobileExitIntercepted) {
    history.go(-1);
  }
});

//scroll logic

let lastScrollTop = document.documentElement.scrollTop || window.pageYOffset;
let lastScrollTime = Date.now();

const SPEED_THRESHOLD = 4; // px per ms (increase = harder trigger)

window.addEventListener("scroll", () => {

  if (mobileExitIntercepted || !hasInputBlurred) return;

  const currentScroll =
    document.documentElement.scrollTop || window.pageYOffset;

  const now = Date.now();

  const deltaScroll = lastScrollTop - currentScroll;
  const deltaTime = now - lastScrollTime;

  const scrollSpeed = deltaScroll / deltaTime;

  // quick upward flick
  const fastScrollUp =
    deltaScroll > 80 &&
    deltaTime < 250 &&
    scrollSpeed > SPEED_THRESHOLD;

  if (fastScrollUp) {
    mobileExitIntercepted = true;
    handlePopupOpen();
  }

  lastScrollTop = currentScroll;
  lastScrollTime = now;

}, { passive: true });

/*  } */

  // validation logic
  let hasValidationError = false;

  function inputValidation(input) {
    const label = input.nextElementSibling;
    const errorMsg = label?.nextElementSibling;
    const type = input.getAttribute('type');

    if (
      input.value.length === 0 ||
      (type === 'email' && !validateEmail(input.value))
    ) {
      input.classList.add('invalid');
      errorMsg && (errorMsg.style.display = 'block');
      hasValidationError = true;
    }
  }

  function handleSubmit(e) {
    e.preventDefault();
  }

  function handleFocus(e) {
    const label = e.target.nextElementSibling;

    if (label) {
      label.style.top = '-20px';
      label.style.fontSize = '14px';
    }

    hasValidationError = false;
  }

  function handleBlur(e) {
    const input = e.target;
    const label = input.nextElementSibling;

    if (!label) return;

//    if (!hasInputBlurred) hasInputBlurred = true;

    if (input.value.trim() === '') {
      label.style.top = '0';
      label.style.fontSize = '16px';
    } else {
      label.style.top = '-20px';
      label.style.fontSize = '14px';
    }
  }

  function handleEnterKey(e) {
    if (e.key === 'Enter' && e.target.nodeName !== 'TEXTAREA') {
      e.preventDefault();
      submitButton?.click();
    }
  }

  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(
      email.trim().toLowerCase()
    );
  }

  form?.addEventListener('submit', handleSubmit);

  formButton?.addEventListener('click', () => {
    submitButton?.click();
  });

  inputs.forEach(input => {
    input.addEventListener('focus', handleFocus);
    input.addEventListener('blur', handleBlur);
    input.addEventListener('keypress', handleEnterKey);
  });
});
</script>

    let googleLoginBtn = null;
    let nameInput = null;
    let emailInput = null;

    function initializeMainPage() {
      googleLoginBtn = document.querySelector(
        ".contact-hero_autofill-button.gmail"
      );
      nameInput = document.getElementById("Full-name");
      emailInput = document.getElementById("Corporate-email");

      if (googleLoginBtn && nameInput && emailInput) {
        setupButtonListeners();
        window.addEventListener("message", receiveToken, false);
      } else {
        if (!googleLoginBtn) {
          console.warn("Button .contact-hero_autofill-button.gmail not found.");
        }
        if (!nameInput) {
          console.warn("Input #Full-name not found.");
        }
        if (!emailInput) {
          console.warn("Input #Corporate-email not found.");
        }
      }
    }

    function setupButtonListeners() {
      googleLoginBtn.addEventListener("click", () => {
        loginWithGoogle();
      });
    }

    function loginWithGoogle() {
      const state = "google:" + generateRandomString();
      localStorage.setItem("oauth_state", state);

      const authUrl =
        "https://accounts.google.com/o/oauth2/v2/auth?" +
        new URLSearchParams({
          client_id: GOOGLE_CLIENT_ID,
          redirect_uri: REDIRECT_URI,
          response_type: "token",
          scope: "openid email profile",
          state: state,
        });

      window.open(
        authUrl,
        "oauthWindow",
        "width=500,height=600,scrollbars=yes,popup=yes"
      );
    }

    function handlePopupRedirect() {
      const hash = window.location.hash.substring(1);
      if (!hash) {
        window.close();
        return;
      }

      const params = new URLSearchParams(hash);

      if (params.has("error")) {
        window.opener.postMessage(
          { error: params.get("error_description") },
          window.location.origin
        );
      } else if (params.has("access_token") && params.has("state")) {
        window.opener.postMessage(
          {
            accessToken: params.get("access_token"),
            state: params.get("state"),
          },
          window.location.origin
        );
      }
      window.close();
    }

    function receiveToken(event) {
      if (event.origin !== window.location.origin) {
        console.warn(
          "Received message from untrusted source:",
          event.origin
        );
        return;
      }

      const { accessToken, state, error } = event.data;

      if (error) {
        alert("Authorization error: " + error);
        return;
      }

      if (accessToken && state) {
        const storedState = localStorage.getItem("oauth_state");

        if (state !== storedState) {
          console.error("Invalid state parameter");
          alert("Security error: state mismatch.");
          return;
        }

        localStorage.removeItem("oauth_state");
        fetchGoogleUserInfo(accessToken);
      }
    }

    async function fetchGoogleUserInfo(token) {
      try {
        const response = await fetch(
          "https://www.googleapis.com/oauth2/v3/userinfo",
          {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          }
        );

        if (!response.ok) {
          throw new Error("Failed to fetch data from Google.");
        }

        const data = await response.json();
        const fullName = data.name;
        const email = data.email;

        console.log("Success! Data received:");
        console.log("Full Name:", fullName);
        console.log("Email:", email);
        
        if(googleLoginBtn) {
	        googleLoginBtn.classList.add("active");
        }

        if (nameInput) {
          nameInput.value = fullName;
          nameInput.dispatchEvent(new Event("input", { bubbles: true }));
          nameInput.dispatchEvent(new Event("blur", { bubbles: true }));
        }
        if (emailInput) {
          emailInput.value = email;
          emailInput.dispatchEvent(new Event("input", { bubbles: true }));
          emailInput.dispatchEvent(new Event("blur", { bubbles: true }));
        }
      } catch (error) {
        console.error("Error fetching data from Google API:", error);
        alert(error.message);
      } finally {
      }
    }

    function generateRandomString() {
      return Math.random().toString(36).substring(2, 15);
    }

    if (window.location.hash && window.opener) {
      handlePopupRedirect();
    } else {
      initializeMainPage();
    }
    
  });
</script>

<script>
(function () {
  if (window.__elitechwizSplitTextInitialized) return;
  window.__elitechwizSplitTextInitialized = true;
  if (typeof gsap === 'undefined') return;
  if (typeof ScrollTrigger !== 'undefined') {
    gsap.registerPlugin(ScrollTrigger);
  }

  function createCharSpans(element) {
    if (!element || element.dataset.eliteSplit === 'true') return [];
    const text = element.textContent || '';
    if (!text.trim()) return [];
    element.dataset.eliteSplit = 'true';
    element.setAttribute('aria-label', text.trim());
    element.textContent = '';
    const spans = [];
    for (const char of text) {
      const span = document.createElement('span');
      span.className = 'elitechwiz-split-char';
      span.textContent = char === ' ' ? '\u00A0' : char;
      span.style.display = 'inline-block';
      element.appendChild(span);
      spans.push(span);
    }
    return spans;
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (typeof gsap === 'undefined') return;
    const selectors = [
      '.home-hero-title-word-bg',
      '.home-hero-title-word-purple',
      '.home-hero-subtitle',
    ];
    selectors.forEach((selector) => {
      document.querySelectorAll(selector).forEach((element) => {
        const chars = createCharSpans(element);
        if (!chars.length) return;
        gsap.from(chars, {
          opacity: 0,
          y: 20,
          duration: 0.55,
          stagger: 0.03,
          ease: 'power3.out',
          scrollTrigger: {
            trigger: element,
            start: 'top 85%',
          },
        });
      });
    });
  });
})();
</script>
